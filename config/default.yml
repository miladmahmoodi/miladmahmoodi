# Forge default configuration schema
# This file documents all available fields and their defaults.
# Copy this to your profile repo and rename it to config.yml.

# ── Identity (required) ───────────────────────────────────────────────────────
name:     ""         # Your full name
username: ""         # Your GitHub username
role:     ""         # Your title (e.g. "Backend Engineer")

# ── Identity (optional) ───────────────────────────────────────────────────────
company:  ""         # Company or organization
location: ""         # City, Country
website:  ""         # https://yoursite.dev
bio:      ""         # One sentence about you

# ── Theme ─────────────────────────────────────────────────────────────────────
theme: terminal      # terminal | minimal | dashboard | docs | retro | hacker

